<script>
  // Conditionally + synchronously load Supabase UMD when keys are configured.
  // Uses document.write so subsequent script tags (api.jsx) don't run until
  // window.supabase is available — otherwise HAS_BACKEND captures false on
  // first read and the platform stays in mock mode forever.
  (function () {
    var c = window.FAST_ILA_CONFIG || {};
    if (c.supabaseUrl && c.supabaseAnonKey) {
      document.write('<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.4/dist/umd/supabase.min.js" crossorigin="anonymous"><\/script>');
    }
  })();
</script>
