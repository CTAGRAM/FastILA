# Fast-ILA static host (Koyeb). Mirrors vercel.json: clean URLs, .jsx as JS,
# SPA fallback, and cache headers. Listens on 8000 (Koyeb default service port).
server {
    listen 8000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Clean URLs → the app reads ?mode= from the query string (see app.jsx).
    location = /booking { return 302 /?mode=booking; }
    location = /portal  { return 302 /?mode=portal; }
    location = /admin   { return 302 /?mode=dashboard; }
    location = /embed   { return 302 /?mode=booking&chrome=off; }

    # .jsx is served as JavaScript and never cached (Babel compiles it live).
    location ~* \.jsx$ {
        default_type application/javascript;
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Other code files — always revalidate so deploys take effect immediately.
    location ~* \.(js|css|html)$ {
        add_header Cache-Control "no-cache, must-revalidate" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    # Static assets — long-lived immutable cache.
    location ~* \.(png|jpg|jpeg|svg|webp|woff2?|ico)$ {
        add_header Cache-Control "public, max-age=31536000, immutable" always;
    }

    # SPA fallback (no X-Frame-Options so the WordPress embed iframe still works).
    location / {
        add_header X-Content-Type-Options "nosniff" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        try_files $uri $uri/ /index.html;
    }
}
