# Supabase local config — `supabase start` reads this when developing locally.
project_id = "fast-ila"

[api]
enabled = true
port = 54321
schemas = ["public", "storage"]

[db]
port = 54322
major_version = 15

[studio]
enabled = true
port = 54323

[auth]
enabled = true
site_url = "https://fastila-goodfor-46310a61.koyeb.app"
additional_redirect_urls = ["https://fastila-goodfor-46310a61.koyeb.app", "https://fast-ila.co.uk", "http://localhost:5173"]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false

[functions.create-booking]
verify_jwt = false

[functions.send-booking-email]
verify_jwt = true

# Drains the message queue (email/SMS). Auth is handled inside the function
# (service-role key from pg_cron, or an admin JWT from the dashboard).
[functions.dispatch-automations]
verify_jwt = false

# Admin-only staff provisioning. Validates the caller's admin JWT internally.
[functions.invite-user]
verify_jwt = false

# Calendar connect/status/disconnect/sync. Auth handled inside (admin/lawyer
# JWT, or service-role key from pg_cron for sync).
[functions.calendar]
verify_jwt = false

# OAuth redirect target — must be public (browser redirect from Google/MS).
# Integrity is enforced via the HMAC-signed state parameter.
[functions.calendar-oauth-callback]
verify_jwt = false

# Transcribes a stored recording (Whisper) + AI summary. Auth handled inside
# (staff JWT, or service-role key).
[functions.transcribe]
verify_jwt = false

# Phase 3b: pulls Meet/Teams transcripts for recent calls. Auth handled inside
# (admin JWT, or service-role key from pg_cron).
[functions.recordings-ingest]
verify_jwt = false

# Phase 4: reports which provider secrets are configured (booleans only).
[functions.health]
verify_jwt = false

# Public returning-client check for the booking form (returns booleans only).
[functions.client-lookup]
verify_jwt = false

# AI assistant / brief / note — server-side Anthropic+OpenAI proxy (staff only).
[functions.ai]
verify_jwt = false

# 2-step staff access. staff-invite: admin sends approve/reject email (admin JWT
# checked inside). staff-approve: public token target of the email links.
# auth-gate: the dashboard login gate (validates the caller's own JWT inside).
[functions.staff-invite]
verify_jwt = false

[functions.staff-approve]
verify_jwt = false

[functions.auth-gate]
verify_jwt = false

[storage]
enabled = true
file_size_limit = "50MiB"
